<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 800" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="640" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#12283f">Governing Frontier AI — The US Federal Lens</text>
  <text x="640" y="64" text-anchor="middle" font-size="13.5" fill="#5b6b7b">Organized by governance layer, softest/most-influential at top to hardest/narrowest at bottom · July 2026</text>

  <!-- ===================== LAYER 1 ===================== -->
  <rect x="345" y="110" width="610" height="78" rx="6" fill="#eaf2fb" stroke="#b8d0ea" stroke-width="1.5"/>
  <text x="650" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#12283f">Layer 1 · Corporate self-governance</text>
  <text x="461.8" y="154" text-anchor="start" font-size="12.5" fill="#33475b">Frontier labs — </text> <a xlink:href="https://www.anthropic.com/rsp" target="_blank"><text x="550.0" y="154" text-anchor="start" font-size="12.5" fill="#1f4e79">RSP¹</text></a> <text x="586.2" y="154" text-anchor="middle" font-size="12.5" fill="#33475b">·</text> <a xlink:href="https://openai.com/preparedness/" target="_blank"><text x="592.8" y="154" text-anchor="start" font-size="12.5" fill="#1f4e79">Preparedness²</text></a> <text x="681.0" y="154" text-anchor="middle" font-size="12.5" fill="#33475b">·</text> <a xlink:href="https://deepmind.google/" target="_blank"><text x="687.5" y="154" text-anchor="start" font-size="12.5" fill="#1f4e79">Frontier Safety Framework³</text></a>
  <text x="650" y="174" text-anchor="middle" font-size="12.5" font-style="italic" fill="#33475b">internal red-teaming · public system cards   —   bindingness: none (self-set)</text>

  <!-- ===================== LAYER 2 ===================== -->
  <rect x="383" y="196" width="534" height="88" rx="6" fill="#cfe0f5" stroke="#9dbde4" stroke-width="1.5"/>
  <text x="650" y="219" text-anchor="middle" font-size="16" font-weight="700" fill="#12283f">Layer 2 · Voluntary gov–industry (soft law)</text>
  <a xlink:href="https://www.nist.gov/caisi" target="_blank"><text x="526.2" y="242" text-anchor="start" font-size="12.5" fill="#1f4e79">CAISI⁴</text></a> <text x="569.2" y="242" text-anchor="middle" font-size="12.5" fill="#25384b">·</text> <a xlink:href="https://www.nist.gov/itl/ai-risk-management-framework" target="_blank"><text x="575.8" y="242" text-anchor="start" font-size="12.5" fill="#1f4e79">NIST AI RMF⁵</text></a> <text x="660.2" y="242" text-anchor="middle" font-size="12.5" fill="#25384b">·</text> <a xlink:href="https://www.nist.gov/news-events/news/2024/11/us-ai-safety-institute-establishes-new-us-government-taskforce-collaborate" target="_blank"><text x="666.8" y="242" text-anchor="start" font-size="12.5" fill="#1f4e79">TRAINS Taskforce⁶</text></a>
  <a xlink:href="https://www.whitehouse.gov/presidential-actions/2026/06/promoting-advanced-artificial-intelligence-innovation-and-security/" target="_blank"><text x="650" y="261" text-anchor="middle" font-size="12.5" fill="#1f4e79">frontier early-access framework⁷ (= the June-2026 EO)</text></a>
  <text x="650" y="278" text-anchor="middle" font-size="11.5" font-style="italic" fill="#25384b">voluntary testing agreements — bindingness: low</text>

  <!-- ===================== LAYER 3 ===================== -->
  <rect x="421" y="292" width="458" height="94" rx="6" fill="#a9c7ec" stroke="#7fa6d6" stroke-width="1.5"/>
  <text x="650" y="315" text-anchor="middle" font-size="16" font-weight="700" fill="#0f2033">Layer 3 · Executive / administrative</text>
  <a xlink:href="https://www.federalregister.gov/documents/2025/01/31/2025-02172/removing-barriers-to-american-leadership-in-artificial-intelligence" target="_blank"><text x="464.2" y="337" text-anchor="start" font-size="12" fill="#1f4e79">EO 14179⁸</text></a> <text x="528.5" y="337" text-anchor="middle" font-size="12" fill="#17293b">·</text> <a xlink:href="https://www.whitehouse.gov/wp-content/uploads/2025/07/Americas-AI-Action-Plan.pdf" target="_blank"><text x="535.0" y="337" text-anchor="start" font-size="12" fill="#1f4e79">AI Action Plan⁹</text></a> <text x="620.5" y="337" text-anchor="middle" font-size="12" fill="#17293b">·</text> <a xlink:href="https://www.whitehouse.gov/presidential-actions/2025/12/eliminating-state-law-obstruction-of-national-artificial-intelligence-policy/" target="_blank"><text x="627.0" y="337" text-anchor="start" font-size="12" fill="#1f4e79">Nat'l Framework EO¹⁰</text></a> <text x="748.0" y="337" text-anchor="middle" font-size="12" fill="#17293b">·</text> <a xlink:href="https://www.whitehouse.gov/presidential-actions/2026/06/promoting-advanced-artificial-intelligence-innovation-and-security/" target="_blank"><text x="754.5" y="337" text-anchor="start" font-size="12" fill="#1f4e79">June-2026 EO⁷</text></a>
  <text x="530.0" y="357" text-anchor="start" font-size="12" fill="#17293b">existing agency authority (</text> <a xlink:href="https://www.ftc.gov/" target="_blank"><text x="668.8" y="357" text-anchor="start" font-size="12" fill="#1f4e79">FTC</text></a> <text x="698.2" y="357" text-anchor="middle" font-size="12" fill="#17293b">·</text> <a xlink:href="https://www.justice.gov/" target="_blank"><text x="704.8" y="357" text-anchor="start" font-size="12" fill="#1f4e79">DOJ</text></a> <text x="735.2" y="357" text-anchor="middle" font-size="12" fill="#17293b">·</text> <a xlink:href="https://www.fcc.gov/" target="_blank"><text x="741.8" y="357" text-anchor="start" font-size="12" fill="#1f4e79">FCC</text></a> <text x="766.0" y="357" text-anchor="start" font-size="12" fill="#17293b">)</text>
  <text x="650" y="376" text-anchor="middle" font-size="11.5" font-style="italic" fill="#2a3c4e">bindingness: medium but reversible</text>

  <!-- ===================== LAYER 4 (big box, nested 4a/4b) ===================== -->
  <rect x="459" y="394" width="382" height="166" rx="6" fill="#cddff2" stroke="#3f74b0" stroke-width="1.5"/>
  <text x="650" y="416" text-anchor="middle" font-size="16" font-weight="700" fill="#0b1826">Layer 4 · Hard law</text>
  <!-- 4a -->
  <a xlink:href="https://www.federalregister.gov/documents/2025/01/15/2025-00636/framework-for-artificial-intelligence-diffusion" target="_blank">
  <rect x="477" y="424" width="346" height="58" rx="5" fill="#6f9fd4" stroke="#3f74b0" stroke-width="1.2"/>
  <text x="650" y="446" text-anchor="middle" font-size="13" font-weight="700" fill="#08131f">4a · Export controls — BIS¹¹ (ECCN 4E091)</text>
  </a>
  <text x="650" y="464" text-anchor="middle" font-size="10.8" font-style="italic" fill="#0a1826">the one binding lever · pulled Fable 5 / Mythos 5 offline (June 2026)</text>
  <!-- 4b (dashed = pending) -->
  <rect x="477" y="490" width="346" height="58" rx="5" fill="#eef4fb" stroke="#3f74b0" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="650" y="512" text-anchor="middle" font-size="13" font-weight="700" fill="#12283f">4b · Pending legislation (not yet law)</text>
  <a xlink:href="https://obernolte.house.gov/media/press-releases/obernolte-trahan-release-discussion-draft-great-american-ai-act" target="_blank"><text x="525.9" y="530" text-anchor="start" font-size="11.5" fill="#1f4e79">GAAIA¹²</text></a> <text x="575.1" y="530" text-anchor="middle" font-size="11.5" fill="#25384b">·</text> <a xlink:href="https://www.congress.gov/bill/119th-congress/house-bill/6875/text" target="_blank"><text x="581.6" y="530" text-anchor="start" font-size="11.5" fill="#1f4e79">AI OVERWATCH Act¹³</text></a> <text x="701.1" y="530" text-anchor="middle" font-size="11.5" fill="#25384b">·</text> <a xlink:href="https://www.govtrack.us/congress/bills/119/hr8170" target="_blank"><text x="707.6" y="530" text-anchor="start" font-size="11.5" fill="#1f4e79">MATCH Act¹⁴</text></a>

  <!-- ===================== INVERSION (right, two block arrows, no crossing) ===================== -->
  <!-- up arrow: operational influence -->
  <polygon points="1025,128 1055,182 1040,182 1040,540 1010,540 1010,182 995,182" fill="#e3f3e4" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="1025" y="340" text-anchor="middle" dominant-baseline="central" font-size="12.5" font-weight="600" fill="#2e7d32" transform="rotate(-90 1025 340)">operational influence</text>
  <!-- down arrow: legal bindingness -->
  <polygon points="1110,546 1140,492 1125,492 1125,132 1095,132 1095,492 1080,492" fill="#e6eef8" stroke="#3f74b0" stroke-width="1.5"/>
  <text x="1110" y="340" text-anchor="middle" dominant-baseline="central" font-size="12.5" font-weight="600" fill="#2e5f96" transform="rotate(-90 1110 340)">legal bindingness</text>
  <text x="1067" y="566" text-anchor="middle" font-size="10" fill="#5b6b7b">power and accountability</text>
  <text x="1067" y="578" text-anchor="middle" font-size="10" fill="#5b6b7b">sit in different layers</text>

  <!-- ===================== FEDERAL–STATE AXIS (left) ===================== -->
  <g transform="translate(0,102)">
  <rect x="40" y="300" width="250" height="150" rx="6" fill="#fdecea" stroke="#e0a39c" stroke-width="1.5"/>
  <text x="165" y="322" text-anchor="middle" font-size="13.5" font-weight="700" fill="#7b241c">State law — the operative floor today</text>
  <a xlink:href="https://leginfo.legislature.ca.gov/faces/billNavClient.xhtml?bill_id=202520260SB53" target="_blank">
  <rect x="56" y="332" width="218" height="26" rx="4" fill="#ffffff" stroke="#e0a39c"/>
  <text x="165" y="349" text-anchor="middle" font-size="11.5" fill="#1f4e79">California SB 53 / TFAIA¹⁵</text>
  </a>
  <a xlink:href="https://www.crowell.com/en/insights/client-alerts/illinois-imposes-transparency-and-safety-obligations-on-frontier-ai-systems" target="_blank">
  <rect x="56" y="362" width="218" height="26" rx="4" fill="#ffffff" stroke="#e0a39c"/>
  <text x="165" y="379" text-anchor="middle" font-size="11.5" fill="#1f4e79">Illinois SB 315¹⁶</text>
  </a>
  <a xlink:href="https://www.governor.ny.gov/news/governor-hochul-signs-nation-leading-legislation-require-ai-frameworks-ai-frontier-models" target="_blank">
  <rect x="56" y="392" width="218" height="26" rx="4" fill="#ffffff" stroke="#e0a39c"/>
  <text x="165" y="409" text-anchor="middle" font-size="11.5" fill="#1f4e79">New York RAISE Act¹⁷</text>
  </a>
  <text x="165" y="432" text-anchor="middle" font-size="10.5" fill="#7b241c">the only rules that bind frontier</text>
  <text x="165" y="444" text-anchor="middle" font-size="10.5" fill="#7b241c">developers — and the preemption target</text>
  </g>

  <!-- preemption arrow: federal reaching down-left to state -->
  <line x1="459" y1="477" x2="296" y2="477" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="377" y="470" text-anchor="middle" font-size="10.5" font-weight="600" fill="#c0392b">preemption push</text>

  <!-- ===================== MYTHOS/FABLE THREAD (curvy) ===================== -->
  <text x="952" y="102" text-anchor="end" font-size="11" font-weight="700" fill="#8e44ad">Mythos → Fable (one model's path through every layer)</text>
  <path d="M 950,118 C 970,158 940,205 917,240 S 905,320 895,368 S 862,442 823,452"
        fill="none" stroke="#8e44ad" stroke-width="2" stroke-dasharray="2 5" stroke-linecap="round"/>
  <circle cx="950" cy="118" r="4" fill="#8e44ad"/>
  <circle cx="917" cy="240" r="4" fill="#8e44ad"/>
  <circle cx="823" cy="452" r="4" fill="#8e44ad"/>

  <!-- ===================== LEGEND + ARGUMENT (centered pair) ===================== -->
  <g transform="translate(35,0)">
  <rect x="40" y="590" width="470" height="160" rx="6" fill="#f7f9fc" stroke="#d5dee8"/>
  <text x="58" y="614" font-size="13.5" font-weight="700" fill="#12283f">Legend</text>
  <rect x="58" y="626" width="26" height="14" fill="#eaf2fb" stroke="#b8d0ea"/>
  <rect x="58" y="644" width="26" height="14" fill="#6f9fd4" stroke="#3f74b0"/>
  <text x="94" y="638" font-size="11.5" fill="#33475b">Color depth = legal bindingness (pale = none, deep = hard law)</text>
  <text x="94" y="656" font-size="11.5" fill="#33475b">Band width = breadth of scope (wider = broader reach)</text>
  <line x1="60" y1="674" x2="86" y2="674" stroke="#3f74b0" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="94" y="678" font-size="11.5" fill="#33475b">Dashed outline = proposed, not yet binding</text>
  <line x1="60" y1="692" x2="86" y2="692" stroke="#8e44ad" stroke-width="2" stroke-dasharray="2 5"/>
  <text x="94" y="696" font-size="11.5" fill="#33475b">Purple dotted = Mythos/Fable's route through the layers</text>
  <line x1="60" y1="710" x2="86" y2="710" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="94" y="714" font-size="11.5" fill="#33475b">Red arrow = federal preemption aimed at state law</text>
  <text x="58" y="734" font-size="10.5" font-style="italic" fill="#5b6b7b">CBRN = chemical, biological, radiological, nuclear — the standard cross-lab risk grouping</text>

  <!-- argument box (no header) -->
  <rect x="530" y="590" width="540" height="160" rx="6" fill="#f7f9fc" stroke="#d5dee8"/>
  <text x="548" y="618" font-size="12.5" fill="#33475b">The layer with the most influence over what models do (corporate) is the least</text>
  <text x="548" y="638" font-size="12.5" fill="#33475b">binding; the layer that binds hardest (export controls) touches models only from</text>
  <text x="548" y="658" font-size="12.5" fill="#33475b">the side of access. There is no binding federal safety floor — the export-control</text>
  <text x="548" y="678" font-size="12.5" fill="#33475b">lever points outward at adversaries, not inward at the race among domestic labs.</text>
  <text x="548" y="698" font-size="12.5" fill="#33475b">Closing that gap requires statute (Layer 4b).</text>
  <text x="548" y="726" font-size="10.5" font-style="italic" fill="#5b6b7b">Analytical view draws on Amodei's "Policy on the AI Exponential" and Brill's "Race to</text>
  <text x="548" y="740" font-size="10.5" font-style="italic" fill="#5b6b7b">the Bottom on Safety" — see the companion notes.</text>
  </g>

  <text x="40" y="778" font-size="10" fill="#8a97a5">Companion written map: "US Federal AI Governance Map.md" · full clickable source list in the ".html" version · diagram items link to primary sources when opened in a browser.</text>
</svg>
